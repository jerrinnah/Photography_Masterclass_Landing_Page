<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Login | Jay Masterclass</title>
    <link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@300;400;500;600;700&family=Playfair+Display:wght@600;700&display=swap" rel="stylesheet" />
    <!-- Facebook Pixel -->

      n.callMethod.apply(n,arguments):n.queue.push(arguments)};
      if(!f._fbq)f._fbq=n;n.push=n;n.loaded=!0;n.version='2.0';
      n.queue=[];t=b.createElement(e);t.async=!0;
      t.src=v;s=b.getElementsByTagName(e)[0];
      s.parentNode.insertBefore(t,s)}(window, document,'script',

    <noscript><img height="1" width="1" style="display:none" src="https://www.facebook.com/tr?id=517290012136807&ev=PageView&noscript=1"/></noscript>
    <!-- End Facebook Pixel -->
    <style>
      *, *::before, *::after { margin: 0; padding: 0; box-sizing: border-box; }
      body {
        background: #0a0a0a;
        color: #f5f0eb;
        font-family: "DM Sans", sans-serif;
        min-height: 100vh;
        display: flex;
        align-items: center;
        justify-content: center;
        padding: 24px;
      }
      .card {
        background: #111;
        border: 1px solid #1e1e1e;
        border-radius: 16px;
        padding: 48px 40px;
        width: 100%;
        max-width: 440px;
      }
      .logo {
        font-family: "Playfair Display", serif;
        font-size: 22px;
        color: #c8a24e;
        text-align: center;
        margin-bottom: 8px;
      }
      .tagline {
        font-size: 12px;
        color: #555;
        text-align: center;
        letter-spacing: 2px;
        text-transform: uppercase;
        margin-bottom: 40px;
      }
      h1 {
        font-family: "Playfair Display", serif;
        font-size: 26px;
        text-align: center;
        margin-bottom: 6px;
      }
      .subtitle { font-size: 14px; color: #666; text-align: center; margin-bottom: 32px; }
      .form-group { margin-bottom: 20px; }
      label {
        display: block;
        font-size: 12px;
        font-weight: 600;
        letter-spacing: 1px;
        text-transform: uppercase;
        color: #888;
        margin-bottom: 8px;
      }
      input {
        width: 100%;
        background: #161616;
        border: 1px solid #1e1e1e;
        border-radius: 10px;
        padding: 14px 16px;
        font-size: 15px;
        color: #f5f0eb;
        font-family: "DM Sans", sans-serif;
        transition: border-color 0.2s;
        outline: none;
      }
      input:focus { border-color: #c8a24e; }
      input.error { border-color: #e55; }
      .error-msg { font-size: 13px; color: #e55; margin-top: 6px; display: none; }
      .forgot-link {
        display: block;
        text-align: right;
        font-size: 13px;
        color: #c8a24e;
        text-decoration: none;
        margin-top: 8px;
        cursor: pointer;
      }
      .forgot-link:hover { opacity: 0.8; }
      .btn {
        width: 100%;
        padding: 16px;
        background: #c8a24e;
        color: #0a0a0a;
        border: none;
        border-radius: 10px;
        font-family: "DM Sans", sans-serif;
        font-size: 15px;
        font-weight: 700;
        cursor: pointer;
        transition: opacity 0.2s, transform 0.1s;
        margin-top: 8px;
      }
      .btn:hover { opacity: 0.9; transform: translateY(-1px); }
      .btn:disabled { opacity: 0.5; cursor: not-allowed; transform: none; }
      .divider { text-align: center; color: #333; font-size: 13px; margin: 24px 0; }
      .enrol-link {
        display: block;
        text-align: center;
        font-size: 14px;
        color: #666;
      }
      .enrol-link a { color: #c8a24e; text-decoration: none; border-bottom: 1px solid rgba(200,162,78,0.3); }
      .enrol-link a:hover { border-color: #c8a24e; }
      .reset-success {
        display: none;
        background: rgba(200,162,78,0.08);
        border: 1px solid rgba(200,162,78,0.2);
        border-radius: 10px;
        padding: 14px 16px;
        font-size: 14px;
        color: #c8a24e;
        text-align: center;
        margin-bottom: 16px;
      }
      .checking {
        text-align: center;
        padding: 40px 0;
      }
      .spinner {
        width: 32px;
        height: 32px;
        border: 3px solid #1e1e1e;
        border-top-color: #c8a24e;
        border-radius: 50%;
        animation: spin 0.8s linear infinite;
        margin: 0 auto;
      }
      @keyframes spin { to { transform: rotate(360deg); } }
    </style>
  </head>
  <body>
    <div class="card">
      <div class="logo">Jay Masterclass</div>
      <div class="tagline">The Complete Photography Course</div>

      <!-- Loading state while checking auth -->
      <div id="checkingState" class="checking">
        <div class="spinner"></div>
      </div>

      <!-- Login form -->
      <div id="loginState" style="display:none">
        <h1>Welcome Back</h1>
        <p class="subtitle">Sign in to access your course</p>

        <div class="reset-success" id="resetSuccess">
          Reset link sent! Check your email inbox.
        </div>

        <div class="form-group">
          <label>Email Address</label>
          <input type="email" id="emailInput" placeholder="your@email.com" />
          <div class="error-msg" id="emailError"></div>
        </div>
        <div class="form-group">
          <label>Password</label>
          <input type="password" id="passwordInput" placeholder="Your password (default: your email address)" />
          <div class="error-msg" id="passError"></div>
          <span class="forgot-link" onclick="forgotPassword()">Forgot password?</span>
        </div>

        <div class="error-msg" id="loginError" style="margin-bottom: 12px;"></div>
        <button class="btn" id="loginBtn" onclick="handleLogin()">Sign In to Course</button>

        <div class="divider">—</div>
        <p class="enrol-link">Don't have access yet? <a href="index.html">Enrol in the course →</a></p>
      </div>
    </div>

    <script type="module">
      import { initializeApp }                                           from "https://www.gstatic.com/firebasejs/10.12.0/firebase-app.js";
      import { getAuth, signInWithEmailAndPassword, sendPasswordResetEmail, onAuthStateChanged } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-auth.js";
      import firebaseConfig from "./firebase-config.js";

      const app  = initializeApp(firebaseConfig);
      const auth = getAuth(app);

      // If already logged in → go straight to course
      onAuthStateChanged(auth, (user) => {
        if (user) {
          window.location.href = "course.html";
          return;
        }
        document.getElementById("checkingState").style.display = "none";
        document.getElementById("loginState").style.display    = "block";
      });

      // ── Login ──
      window.handleLogin = async function () {
        const email    = document.getElementById("emailInput").value.trim();
        const password = document.getElementById("passwordInput").value;
        const emailErr = document.getElementById("emailError");
        const passErr  = document.getElementById("passError");
        const loginErr = document.getElementById("loginError");
        const btn      = document.getElementById("loginBtn");

        emailErr.style.display = "none";
        passErr.style.display  = "none";
        loginErr.style.display = "none";
        document.getElementById("emailInput").classList.remove("error");
        document.getElementById("passwordInput").classList.remove("error");

        let hasError = false;
        if (!email || !email.includes("@")) {
          emailErr.textContent = "Enter a valid email address";
          emailErr.style.display = "block";
          document.getElementById("emailInput").classList.add("error");
          hasError = true;
        }
        if (!password) {
          passErr.textContent = "Enter your password";
          passErr.style.display = "block";
          document.getElementById("passwordInput").classList.add("error");
          hasError = true;
        }
        if (hasError) return;

        btn.textContent = "Signing in...";
        btn.disabled    = true;

        try {
          await signInWithEmailAndPassword(auth, email, password);
          window.location.href = "course.html";
        } catch (err) {
          btn.textContent = "Sign In to Course";
          btn.disabled    = false;

          if (err.code === "auth/user-not-found" || err.code === "auth/wrong-password" || err.code === "auth/invalid-credential") {
            loginErr.textContent = "Incorrect email or password. Please try again.";
          } else if (err.code === "auth/too-many-requests") {
            loginErr.textContent = "Too many attempts. Please try again later or reset your password.";
          } else {
            loginErr.textContent = "Something went wrong. Please try again.";
          }
          loginErr.style.display = "block";
        }
      };

      // ── Forgot Password ──
      window.forgotPassword = async function () {
        const email = document.getElementById("emailInput").value.trim();
        if (!email || !email.includes("@")) {
          const emailErr = document.getElementById("emailError");
          emailErr.textContent = "Enter your email address above first";
          emailErr.style.display = "block";
          document.getElementById("emailInput").classList.add("error");
          return;
        }
        try {
          await sendPasswordResetEmail(auth, email);
          document.getElementById("resetSuccess").style.display = "block";
        } catch {
          document.getElementById("loginError").textContent = "Could not send reset email. Check your email address.";
          document.getElementById("loginError").style.display = "block";
        }
      };

      // Allow Enter key to submit
      document.addEventListener("keydown", (e) => {
        if (e.key === "Enter") window.handleLogin();
      });
    </script>
  </body>
</html>
