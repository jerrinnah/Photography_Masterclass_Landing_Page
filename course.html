<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Course Portal | Jay Masterclass</title>
    <link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@300;400;500;600;700&family=Playfair+Display:wght@600;700&display=swap" rel="stylesheet" />
    <!-- Facebook Pixel -->
    <script>
      !function(f,b,e,v,n,t,s)
      {if(f.fbq)return;n=f.fbq=function(){n.callMethod?
      n.callMethod.apply(n,arguments):n.queue.push(arguments)};
      if(!f._fbq)f._fbq=n;n.push=n;n.loaded=!0;n.version='2.0';
      n.queue=[];t=b.createElement(e);t.async=!0;
      t.src=v;s=b.getElementsByTagName(e)[0];
      s.parentNode.insertBefore(t,s)}(window, document,'script',
      'https://connect.facebook.net/en_US/fbevents.js');
      fbq('init', '517290012136807');
      fbq('track', 'PageView');
    </script>
    <noscript><img height="1" width="1" style="display:none" src="https://www.facebook.com/tr?id=517290012136807&ev=PageView&noscript=1"/></noscript>
    <!-- End Facebook Pixel -->
    <style>
      *, *::before, *::after { margin: 0; padding: 0; box-sizing: border-box; }
      body {
        background: #0a0a0a;
        color: #f5f0eb;
        font-family: "DM Sans", sans-serif;
        min-height: 100vh;
        -webkit-font-smoothing: antialiased;
        overflow-x: hidden;
      }

      /* ── Auth overlay ── */
      #authOverlay {
        position: fixed; inset: 0;
        background: #0a0a0a;
        display: flex; align-items: center; justify-content: center;
        z-index: 999;
      }
      .spinner {
        width: 40px; height: 40px;
        border: 3px solid #1e1e1e;
        border-top-color: #c8a24e;
        border-radius: 50%;
        animation: spin 0.8s linear infinite;
      }
      @keyframes spin { to { transform: rotate(360deg); } }

      /* ── Top Bar ── */
      .topbar {
        position: sticky; top: 0;
        background: rgba(10,10,10,0.95);
        backdrop-filter: blur(12px);
        border-bottom: 1px solid #1a1a1a;
        height: 60px;
        display: flex; align-items: center; justify-content: space-between;
        padding: 0 32px;
        z-index: 100;
      }
      .topbar-logo {
        font-family: "Playfair Display", serif;
        font-size: 18px;
        color: #c8a24e;
      }
      .topbar-right { display: flex; align-items: center; gap: 16px; }
      .user-email { font-size: 13px; color: #444; }
      @media (max-width: 600px) { .user-email { display: none; } }
      .logout-btn {
        font-size: 13px; color: #666;
        background: none;
        border: 1px solid #222;
        border-radius: 8px;
        padding: 6px 14px;
        cursor: pointer;
        font-family: "DM Sans", sans-serif;
        transition: color 0.2s, border-color 0.2s;
      }
      .logout-btn:hover { color: #f5f0eb; border-color: #444; }

      /* ── Page body ── */
      .page { padding: 40px 32px 80px; max-width: 1400px; margin: 0 auto; }
      @media (max-width: 600px) { .page { padding: 28px 16px 60px; } }

      /* ── Welcome ── */
      .welcome {
        margin-bottom: 48px;
        padding-bottom: 32px;
        border-bottom: 1px solid #1a1a1a;
      }
      .welcome-label {
        font-size: 11px;
        letter-spacing: 3px;
        text-transform: uppercase;
        color: #c8a24e;
        font-weight: 600;
        margin-bottom: 10px;
      }
      .welcome h1 {
        font-family: "Playfair Display", serif;
        font-size: clamp(24px, 3vw, 36px);
        font-weight: 700;
        margin-bottom: 8px;
      }
      .welcome p { font-size: 15px; color: #555; }

      /* ── Part section ── */
      .part-section { margin-bottom: 52px; }
      .part-header { margin-bottom: 20px; }
      .part-tag {
        display: inline-block;
        font-size: 10px;
        letter-spacing: 3px;
        text-transform: uppercase;
        color: #c8a24e;
        font-weight: 600;
        background: rgba(200,162,78,0.08);
        border: 1px solid rgba(200,162,78,0.15);
        padding: 5px 12px;
        border-radius: 20px;
        margin-bottom: 10px;
      }
      .part-title {
        font-family: "Playfair Display", serif;
        font-size: 20px;
        font-weight: 700;
        color: #f5f0eb;
      }

      /* ── Horizontal scroll row ── */
      .cards-row {
        display: flex;
        gap: 16px;
        overflow-x: auto;
        padding-bottom: 12px;
        scroll-snap-type: x mandatory;
        scrollbar-width: thin;
        scrollbar-color: #1e1e1e transparent;
        -webkit-overflow-scrolling: touch;
      }
      .cards-row::-webkit-scrollbar { height: 4px; }
      .cards-row::-webkit-scrollbar-track { background: transparent; }
      .cards-row::-webkit-scrollbar-thumb { background: #1e1e1e; border-radius: 2px; }

      /* ── Card ── */
      .card {
        flex: 0 0 280px;
        background: #111;
        border: 1px solid #1a1a1a;
        border-radius: 12px;
        overflow: hidden;
        cursor: pointer;
        transition: border-color 0.2s, transform 0.2s;
        scroll-snap-align: start;
        display: flex;
        flex-direction: column;
      }
      .card:hover {
        border-color: rgba(200,162,78,0.4);
        transform: translateY(-3px);
      }

      /* ── Thumbnail ── */
      .card-thumb {
        position: relative;
        width: 100%;
        padding-top: 56.25%;
        background: #161616;
        overflow: hidden;
        flex-shrink: 0;
      }
      .card-thumb img {
        position: absolute; inset: 0;
        width: 100%; height: 100%;
        object-fit: cover;
        transition: transform 0.3s;
      }
      .card:hover .card-thumb img { transform: scale(1.04); }
      .thumb-placeholder {
        position: absolute; inset: 0;
        display: flex; flex-direction: column;
        align-items: center; justify-content: center;
        background: #141414;
        gap: 8px;
      }
      .thumb-placeholder .play-ring {
        width: 48px; height: 48px;
        border: 2px solid #2a2a2a;
        border-radius: 50%;
        display: flex; align-items: center; justify-content: center;
        color: #333; font-size: 16px;
      }
      .thumb-placeholder span { font-size: 11px; color: #333; letter-spacing: 1px; }
      .play-overlay {
        position: absolute; inset: 0;
        display: flex; align-items: center; justify-content: center;
        background: rgba(0,0,0,0.35);
        opacity: 0;
        transition: opacity 0.2s;
      }
      .card:hover .play-overlay { opacity: 1; }
      .play-btn {
        width: 52px; height: 52px;
        background: rgba(200,162,78,0.9);
        border-radius: 50%;
        display: flex; align-items: center; justify-content: center;
        color: #0a0a0a;
        font-size: 18px;
        padding-left: 4px;
      }
      .chapter-badge {
        position: absolute;
        top: 10px; left: 10px;
        background: rgba(10,10,10,0.85);
        border: 1px solid rgba(200,162,78,0.3);
        border-radius: 6px;
        font-size: 11px;
        font-weight: 700;
        color: #c8a24e;
        padding: 3px 8px;
        letter-spacing: 1px;
      }

      /* ── Card body ── */
      .card-body { padding: 16px; flex: 1; display: flex; flex-direction: column; gap: 8px; }
      .card-title {
        font-size: 14px;
        font-weight: 600;
        color: #f5f0eb;
        line-height: 1.4;
      }
      .card-desc {
        font-size: 12px;
        color: #666;
        line-height: 1.6;
        flex: 1;
        display: -webkit-box;
        -webkit-line-clamp: 3;
        -webkit-box-orient: vertical;
        overflow: hidden;
      }
      .card-footer {
        display: flex; align-items: center; justify-content: space-between;
        margin-top: 4px;
      }
      .lessons-badge {
        font-size: 11px;
        color: #444;
      }
      .watch-label {
        font-size: 11px;
        color: #c8a24e;
        font-weight: 600;
        letter-spacing: 0.5px;
      }

      /* ── Video Modal ── */
      .modal-overlay {
        display: none;
        position: fixed; inset: 0;
        background: rgba(0,0,0,0.92);
        z-index: 500;
        align-items: center;
        justify-content: center;
        padding: 20px;
      }
      .modal-overlay.open { display: flex; }
      .modal {
        background: #111;
        border: 1px solid #1e1e1e;
        border-radius: 14px;
        width: 100%;
        max-width: 860px;
        overflow: hidden;
        position: relative;
        animation: modalIn 0.25s ease;
      }
      @keyframes modalIn { from { opacity: 0; transform: scale(0.96); } to { opacity: 1; transform: scale(1); } }
      .modal-close {
        position: absolute; top: 14px; right: 14px;
        width: 32px; height: 32px;
        background: rgba(10,10,10,0.7);
        border: 1px solid #2a2a2a;
        border-radius: 50%;
        color: #888; font-size: 16px;
        cursor: pointer; z-index: 10;
        display: flex; align-items: center; justify-content: center;
        transition: color 0.2s, border-color 0.2s;
        font-family: "DM Sans", sans-serif;
      }
      .modal-close:hover { color: #f5f0eb; border-color: #555; }
      .modal-video {
        position: relative;
        padding-top: 56.25%;
        background: #000;
      }
      .modal-video iframe {
        position: absolute; inset: 0;
        width: 100%; height: 100%;
        border: none;
      }
      .modal-info { padding: 20px 24px 24px; }
      .modal-chapter-tag {
        font-size: 10px;
        letter-spacing: 3px;
        text-transform: uppercase;
        color: #c8a24e;
        font-weight: 600;
        margin-bottom: 8px;
      }
      .modal-title {
        font-family: "Playfair Display", serif;
        font-size: 20px;
        font-weight: 700;
        margin-bottom: 8px;
      }
      .modal-desc { font-size: 13px; color: #666; line-height: 1.7; }
    </style>
  </head>
  <body>

    <!-- Auth overlay -->
    <div id="authOverlay"><div class="spinner"></div></div>

    <!-- Top Bar -->
    <header class="topbar">
      <div class="topbar-logo">Jay Masterclass</div>
      <div class="topbar-right">
        <span class="user-email" id="userEmailDisplay"></span>
        <button class="logout-btn" onclick="handleLogout()">Log Out</button>
      </div>
    </header>

    <!-- Page -->
    <div class="page" id="pageContent" style="display:none">

      <!-- Welcome -->
      <div class="welcome">
        <div class="welcome-label">Your Course</div>
        <h1>The Complete Photography Masterclass</h1>
        <p>16 chapters · 4 parts · 60+ real-world examples · 45+ exercises</p>
      </div>

      <!-- Course rows rendered by JS -->
      <div id="courseRows"></div>
    </div>

    <!-- Video Modal -->
    <div class="modal-overlay" id="modalOverlay" onclick="closeModal(event)">
      <div class="modal" id="modal">
        <button class="modal-close" onclick="closeModalBtn()">✕</button>
        <div class="modal-video" id="modalVideo"></div>
        <div class="modal-info">
          <div class="modal-chapter-tag" id="modalTag"></div>
          <div class="modal-title" id="modalTitle"></div>
          <div class="modal-desc" id="modalDesc"></div>
        </div>
      </div>
    </div>

    <script type="module">
      import { initializeApp }               from "https://www.gstatic.com/firebasejs/10.12.0/firebase-app.js";
      import { getAuth, onAuthStateChanged, signOut } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-auth.js";
      import firebaseConfig                  from "./firebase-config.js";

      const app  = initializeApp(firebaseConfig);
      const auth = getAuth(app);

      // ── Auth guard — wait up to 5s for Firebase to restore session ──
      let redirectTimer = setTimeout(() => { window.location.href = "login.html"; }, 5000);
      onAuthStateChanged(auth, (user) => {
        clearTimeout(redirectTimer);
        if (!user) { window.location.href = "login.html"; return; }
        document.getElementById("authOverlay").style.display  = "none";
        document.getElementById("pageContent").style.display  = "block";
        document.getElementById("userEmailDisplay").textContent = user.email;
      });

      window.handleLogout = async () => {
        await signOut(auth);
        window.location.href = "login.html";
      };

      // ══════════════════════════════════════════════════════════
      // COURSE DATA
      // Replace each videoId with your actual YouTube video ID.
      // YouTube URL example: youtube.com/watch?v=dQw4w9WgXcQ
      //   → videoId: "dQw4w9WgXcQ"
      // desc: a short 1–2 sentence description shown on the card.
      // ══════════════════════════════════════════════════════════
      const PARTS = [
        {
          tag: "Part One",
          title: "Foundations",
          chapters: [
            { num: "01", title: "Understanding Photography",       lessons: "4 Lessons + 4 Exercises", videoId: "YOUR_YOUTUBE_VIDEO_ID", desc: "Discover what photography really is, explore the Nigerian photography lineage, and build the mindset every serious photographer needs." },
            { num: "02", title: "Camera Types and Equipment",      lessons: "5 Lessons + 2 Exercises", videoId: "YOUR_YOUTUBE_VIDEO_ID", desc: "Smartphone vs DSLR vs Mirrorless — get honest advice on what you actually need and how to buy smart in Nigeria." },
            { num: "03", title: "The Exposure Triangle",           lessons: "6 Lessons + 5 Exercises", videoId: "YOUR_YOUTUBE_VIDEO_ID", desc: "Master aperture, shutter speed, and ISO — and understand how they work together to give you full creative control." },
            { num: "04", title: "Composition & Visual Storytelling", lessons: "7 Lessons + 4 Exercises", videoId: "YOUR_YOUTUBE_VIDEO_ID", desc: "Learn the rules of composition, when to break them, and how to tell compelling visual stories with any camera." },
            { num: "05", title: "Understanding Light",             lessons: "6 Lessons + 4 Exercises", videoId: "YOUR_YOUTUBE_VIDEO_ID", desc: "Learn to read, use, and shape light — from golden hour in Lagos to dealing with harsh midday sun at outdoor events." },
          ]
        },
        {
          tag: "Part Two",
          title: "Building Your Craft",
          chapters: [
            { num: "06", title: "Lenses and Creative Applications", lessons: "5 Lessons + 2 Exercises", videoId: "YOUR_YOUTUBE_VIDEO_ID", desc: "Understand prime vs zoom, choose the right focal length for every job, and use lenses as a creative tool." },
            { num: "07", title: "Post-Processing and Editing",      lessons: "6 Lessons + 3 Exercises", videoId: "YOUR_YOUTUBE_VIDEO_ID", desc: "Build a fast, consistent editing workflow in Lightroom — including colour grading for Nigerian skin tones." },
          ]
        },
        {
          tag: "Part Three",
          title: "Advanced Techniques",
          chapters: [
            { num: "08", title: "Genre Mastery",                     lessons: "8 Lessons + 4 Exercises", videoId: "YOUR_YOUTUBE_VIDEO_ID", desc: "Deep-dive into weddings, portraits, street, and commercial photography in the Nigerian context." },
            { num: "09", title: "Advanced Lighting Techniques",      lessons: "5 Lessons + 3 Exercises", videoId: "YOUR_YOUTUBE_VIDEO_ID", desc: "Take control with off-camera flash, multi-light setups, and mixing strobe with ambient light at outdoor receptions." },
            { num: "10", title: "Advanced Composition & Vision",     lessons: "5 Lessons + 2 Exercises", videoId: "YOUR_YOUTUBE_VIDEO_ID", desc: "Develop your personal visual style, learn to sequence a photo essay, and find what makes your work unmistakably yours." },
            { num: "11", title: "Advanced Post-Processing",          lessons: "5 Lessons + 2 Exercises", videoId: "YOUR_YOUTUBE_VIDEO_ID", desc: "Master luminosity masking, frequency separation for skin, and delivering polished galleries to clients." },
          ]
        },
        {
          tag: "Part Four",
          title: "The Business of Photography",
          chapters: [
            { num: "12", title: "Building Your Photography Business", lessons: "8 Lessons + 3 Exercises", videoId: "YOUR_YOUTUBE_VIDEO_ID", desc: "Price your work correctly, write contracts that protect you, and land your first 10 clients without spending money on ads." },
            { num: "13", title: "Scaling Your Photography Income",    lessons: "6 Lessons + 2 Exercises", videoId: "YOUR_YOUTUBE_VIDEO_ID", desc: "Add passive income streams, build studio partnerships, and raise your rates without losing clients." },
            { num: "14", title: "Digital Presence & Personal Brand",  lessons: "5 Lessons + 3 Exercises", videoId: "YOUR_YOUTUBE_VIDEO_ID", desc: "Build an Instagram strategy that works, create a portfolio website on a budget, and get featured in Nigerian media." },
            { num: "15", title: "Ethics, Legal & Professional Standards", lessons: "4 Lessons + 1 Exercise", videoId: "YOUR_YOUTUBE_VIDEO_ID", desc: "Understand model releases, copyright, and how to handle difficult clients with professionalism and confidence." },
            { num: "16", title: "The Road Ahead",                     lessons: "3 Lessons + 1 Exercise", videoId: "YOUR_YOUTUBE_VIDEO_ID", desc: "Build your 5-year career plan, stay inspired, and walk away with a concrete 30-day action plan." },
          ]
        },
      ];

      // ── Render cards ──
      function buildThumb(ch) {
        if (ch.videoId && ch.videoId !== "YOUR_YOUTUBE_VIDEO_ID") {
          return `
            <img src="https://img.youtube.com/vi/${ch.videoId}/maxresdefault.jpg"
                 onerror="this.src='https://img.youtube.com/vi/${ch.videoId}/hqdefault.jpg'"
                 alt="${ch.title}" loading="lazy" />
            <div class="play-overlay"><div class="play-btn">▶</div></div>`;
        }
        return `
          <div class="thumb-placeholder">
            <div class="play-ring">▶</div>
            <span>Coming Soon</span>
          </div>`;
      }

      function renderCourse() {
        const container = document.getElementById("courseRows");
        PARTS.forEach(part => {
          const cards = part.chapters.map(ch => `
            <div class="card" onclick="openModal('${ch.videoId}','${ch.num}','${ch.title.replace(/'/g,"\\'")}','${ch.desc.replace(/'/g,"\\'")}','${part.tag} — ${part.title}','${ch.lessons}')">
              <div class="card-thumb">
                ${buildThumb(ch)}
                <div class="chapter-badge">CH ${ch.num}</div>
              </div>
              <div class="card-body">
                <div class="card-title">${ch.title}</div>
                <div class="card-desc">${ch.desc}</div>
                <div class="card-footer">
                  <span class="lessons-badge">${ch.lessons}</span>
                  <span class="watch-label">Watch →</span>
                </div>
              </div>
            </div>
          `).join("");

          container.innerHTML += `
            <div class="part-section">
              <div class="part-header">
                <div class="part-tag">${part.tag}</div>
                <div class="part-title">${part.title}</div>
              </div>
              <div class="cards-row">${cards}</div>
            </div>
          `;
        });
      }

      renderCourse();

      // ── Modal ──
      window.openModal = (videoId, num, title, desc, partLabel, lessons) => {
        const hasVideo = videoId && videoId !== "YOUR_YOUTUBE_VIDEO_ID";
        document.getElementById("modalVideo").innerHTML = hasVideo
          ? `<iframe src="https://www.youtube.com/embed/${videoId}?autoplay=1&rel=0&modestbranding=1" allowfullscreen allow="autoplay; encrypted-media"></iframe>`
          : `<div style="position:absolute;inset:0;display:flex;flex-direction:column;align-items:center;justify-content:center;background:#0d0d0d;gap:10px;"><div style="font-size:32px;color:#2a2a2a;">▶</div><p style="font-size:13px;color:#444;">Video not added yet</p></div>`;
        document.getElementById("modalTag").textContent   = `Chapter ${num} · ${partLabel} · ${lessons}`;
        document.getElementById("modalTitle").textContent = title;
        document.getElementById("modalDesc").textContent  = desc;
        document.getElementById("modalOverlay").classList.add("open");
        document.body.style.overflow = "hidden";
      };

      window.closeModal = (e) => {
        if (e.target === document.getElementById("modalOverlay")) stopModal();
      };
      window.closeModalBtn = () => stopModal();

      function stopModal() {
        document.getElementById("modalOverlay").classList.remove("open");
        document.getElementById("modalVideo").innerHTML = "";
        document.body.style.overflow = "";
      }

      // Close with Escape key
      document.addEventListener("keydown", e => { if (e.key === "Escape") stopModal(); });
    </script>
  </body>
</html>
